<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial=1.0">
  <title>Disque d’accrétion – Intégrateur géodésique RK4</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="progress-container">
    <div id="lut-progress"></div>
  </div>

  <canvas id="c"></canvas>

  <div id="crosshair"></div>

  <div class="hint">
    <kbd>A</kbd> · <kbd>G</kbd> · <kbd>L</kbd> modes &nbsp;&nbsp; | &nbsp;&nbsp; glisser : navigation fluide · <kbd>Shift</kbd> : précision
  </div>  <div id="mode-badge">▸ GÉODÉSIQUE RK4 — Schwarzschild/Kerr-lite</div>

  <div class="left-controls-container">
    <!-- Nouveau panneau pour les contrôles de paramètres -->
    <div class="panel controls-panel">
      <div class="control-group">
        <label for="incSlider">Inclinaison:</label>
        <input type="range" id="incSlider" min="0" max="90" step="0.1" value="90.0">
        <span id="incSliderVal">90.0°</span>
      </div>
      <div class="control-group">
        <label for="routSlider">Rayon ext.:</label>
        <input type="range" id="routSlider" min="10" max="60" step="0.1" value="25.2">
        <span id="routSliderVal">25.2</span>
      </div>
      <div class="control-group">
        <label for="rotSlider">Vitesse rot.:</label>
        <input type="range" id="rotSlider" min="0.1" max="5.0" step="0.01" value="5.0">
        <span id="rotSliderVal">5.00x</span>
        <span id="rotVal" style="display:none;"></span> <!-- Garder pour compatibilité JS si besoin -->
      </div>
      <div class="control-group">
        <label for="yawSlider">Cam yaw:</label>
        <input type="range" id="yawSlider" min="-180" max="180" step="0.1" value="-179.3">
        <span id="yawSliderVal">-179.3°</span>
      </div>
      <div class="control-group">
        <label for="pitchSlider">Cam pitch:</label>
        <input type="range" id="pitchSlider" min="-75" max="75" step="0.1" value="12.6">
        <span id="pitchSliderVal">12.6°</span>
      </div>
      <div class="control-group">
        <label for="distSlider">Cam dist.:</label>
        <input type="range" id="distSlider" min="12" max="80" step="0.1" value="39.9">
        <span id="distSliderVal">39.9</span>
      </div>
      <div class="control-group">
        <label for="thickSlider">Épaisseur:</label>
        <input type="range" id="thickSlider" min="0.05" max="3.5" step="0.01" value="1.55">
        <span id="thickSliderVal">1.55</span>
      </div>
      <div class="control-group">
        <label for="bendSlider">Lensing:</label>
        <input type="range" id="bendSlider" min="0.2" max="2.0" step="0.01" value="2.0">
        <span id="bendSliderVal">2.00x</span>
      </div>
      <div class="control-group">
        <label for="spinSlider">Spin a:</label>
        <input type="range" id="spinSlider" min="-0.99" max="0.99" step="0.01" value="-0.02">
        <span id="spinSliderVal">-0.02</span>
      </div>
      <div class="control-group">
        <label for="physicsModeToggle">Physique:</label>
        <input type="checkbox" id="physicsModeToggle">
        <span id="physicsModeVal">effective</span>
      </div>
      <div class="control-group">
        <label for="progradeToggle">Sens disque:</label>
        <input type="checkbox" id="progradeToggle" checked>
        <span id="progradeVal">prograde</span>
      </div>
      <div class="control-group">
        <label for="qualitySlider">Qualité:</label>
        <input type="range" id="qualitySlider" min="0.25" max="1.0" step="0.01" value="1.00">
        <span id="qualitySliderVal">1.00</span>
      </div>
      <div class="control-group">
        <label for="autoLodToggle">LOD auto (vitesse caméra):</label>
        <input type="checkbox" id="autoLodToggle" checked>
        <span id="autoLodVal">activé</span>
      </div>
      <div class="control-group">
        <label for="lodMinSlider">LOD min:</label>
        <input type="range" id="lodMinSlider" min="0.25" max="1.0" step="0.01" value="0.25">
        <span id="lodMinVal">0.25</span>
      </div>
      <div class="control-group">
        <label for="lodMaxSlider">LOD max:</label>
        <input type="range" id="lodMaxSlider" min="0.25" max="1.0" step="0.01" value="0.25">
        <span id="lodMaxVal">0.25</span>
      </div>
      <div class="control-group">
        <label for="maxDiskCrossingsSlider">Max crossings disque:</label>
        <input type="range" id="maxDiskCrossingsSlider" min="1" max="5" step="1" value="1">
        <span id="maxDiskCrossingsVal">1</span>
      </div>
      <div class="control-group">
        <label for="exposureSlider">Exposition:</label>
        <input type="range" id="exposureSlider" min="0.30" max="2.50" step="0.01" value="0.30">
        <span id="exposureVal">0.30x</span>
      </div>
      <div class="control-group">
        <label for="followOrbitToggle">Caméra:</label>
        <input type="checkbox" id="followOrbitToggle" checked>
        <span>suivi orbite</span>
      </div>
      <div class="control-group">
        <label for="orbitTrajectoryToggle">Trajectoire:</label>
        <input type="checkbox" id="orbitTrajectoryToggle">
        <span id="orbitTrajectoryVal">cinématique</span>
      </div>
      <div class="control-group">
        <label for="emissionModeToggle">Émission:</label>
        <input type="checkbox" id="emissionModeToggle" checked>
        <span id="emissionModeVal">NT-like</span>
      </div>
    </div>

    <!-- Nouveau panneau pour les modes -->
    <div class="panel mode-panel">
      <button id="modeNormal" class="mode-btn active">NORMAL</button>
      <button id="modeBloom" class="mode-btn">BLOOM</button>
    </div>
  </div>

  <div class="overlay">
    <div class="panel">
      <div class="stat">
        <span class="stat-label">inclinaison</span>
        <span class="stat-value" id="incVal">90.0°</span>
      </div>
      <div class="stat">
        <span class="stat-label">rayon ext.</span>
        <span class="stat-value" id="routVal">25.2</span>
      </div>
      <div class="stat">
        <span class="stat-label">fps</span>
        <span class="stat-value" id="fps">—</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
